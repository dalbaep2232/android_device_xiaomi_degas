name: Build TWRP for Degas (Vendor Boot)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cleanup & Install Dependencies
        run: |
          IMAGES=$(docker images -q)
          if [ -n "$IMAGES" ]; then docker rmi $IMAGES || true; fi
          sudo rm -rf /usr/share/dotnet /etc/mysql /usr/local/lib/android /opt/ghc || true
          
          sudo apt update
          sudo apt install -y gperf gcc-multilib gcc-10-multilib g++-multilib g++-10-multilib \
          libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev \
          libgl1-mesa-dev libxml2-utils xsltproc unzip fontconfig python3 python-is-python3 \
          bc bison build-essential curl flex git gnupg gperf lib32readline-dev liblz4-tool \
          libncurses5-dev libsdl1.2-dev libssl-dev lzop pngcrush rsync schedtool squashfs-tools zip zlib1g-dev

      - name: Install Repo
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Initialize & Sync TWRP
        run: |
          mkdir twrp
          cd twrp
          git config --global user.email "artem@example.com"
          git config --global user.name "Artem"
          repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-14.1
          repo sync -c -j$(nproc) --no-clone-bundle --no-tags

      - name: Clone Device Tree
        run: |
          cd twrp
          git clone ${{ github.server_url }}/${{ github.repository }} device/xiaomi/degas

      - name: Build Vendor Boot
        run: |
          cd twrp
          export ALLOW_MISSING_DEPENDENCIES=true
          . build/envsetup.sh
          # Змінюємо trunk_staging на ap2a
          lunch twrp_degas-ap2a-eng || lunch twrp_degas-eng
          mka vendorbootimage -j$(nproc)

      - name: Upload Vendor Boot Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Degas-VendorBoot
          path: twrp/out/target/product/degas/vendor_boot.img
